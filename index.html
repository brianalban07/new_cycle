<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cycle Time Analyzer</title>

<!-- ✅ FIXED SCRIPT -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
  font-family: 'Segoe UI', Arial;
  background: #f4f6f9;
  margin: 0;
}

.container {
  max-width: 1000px;
  margin: 40px auto;
  background: #fff;
  padding: 25px;
  border-radius: 10px;
  box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
}

h2 { margin-bottom: 20px; }

.controls select, .controls input {
  padding: 8px;
  margin: 5px;
  border-radius: 5px;
  border: 1px solid #ccc;
}

button {
  padding: 10px 20px;
  background: #0078d4;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

button:hover { background: #005ea6; }

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
}

th {
  background: #3f4a5a;
  color: white;
}

td, th {
  padding: 8px;
  border: 1px solid #ddd;
  text-align: center;
}

.week { background: #ffd966; }
.total { background: #28a745; color: white; }

.hidden { display: none; }

/* ✅ LOADING */
#loadingOverlay {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.6);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction: column;
  z-index:9999;
  color:#fff;
}

.spinner {
  width:50px;
  height:50px;
  border:6px solid #ccc;
  border-top:6px solid #0078d4;
  border-radius:50%;
  animation: spin 1s linear infinite;
  margin-bottom:15px;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="container">
<h2>Cycle Time Analyzer</h2>

<div class="controls">
  <select id="modeSelect">
    <option value="">Select Mode</option>
    <option value="single">Single Week</option>
    <option value="multiple">Multiple Weeks</option>
  </select>

  <input type="number" id="weekCount" class="hidden" placeholder="No. of Weeks">
</div>

<div id="fileContainer"></div>

<button id="calculateBtn" class="hidden">Calculate</button>

<table>
  <thead><tr id="headerRow"></tr></thead>
  <tbody id="bodyRow"></tbody>
</table>
</div>

<!-- ✅ LOADING -->
<div id="loadingOverlay" class="hidden">
  <div class="spinner"></div>
  <div>Processing files, please wait...</div>
</div>

<script>
const stageOrder = ["INIT","AST","FLA","IOT","FCT","FC2","IST","FPF","NVL"];

let uploadedFiles = [];
let worker = new Worker('fileWorker.js');
let isSingle = false;

// MODE
modeSelect.onchange = function() {
  uploadedFiles = [];
  fileContainer.innerHTML = '';
  bodyRow.innerHTML = '';
  calculateBtn.classList.add("hidden");

  if (this.value === "single") {
    isSingle = true;
    weekCount.classList.add("hidden");
    createInputs(1);
  } else {
    isSingle = false;
    weekCount.classList.remove("hidden");
  }
};

// INPUTS
weekCount.onchange = function() {
  createInputs(parseInt(this.value));
};

function createInputs(count) {
  fileContainer.innerHTML = '';
  uploadedFiles = new Array(count).fill(null);

  for (let i=0;i<count;i++) {
    let div = document.createElement('div');

    div.innerHTML = `Week ${i+1}: <input type="file">`;

    div.querySelector('input').onchange = e => {
      uploadedFiles[i] = e.target.files[0];
      if (uploadedFiles.every(f=>f)) calculateBtn.classList.remove("hidden");
    };

    fileContainer.appendChild(div);
  }
}

// HEADER
function createHeader() {
  headerRow.innerHTML = '';

  if (!isSingle) {
    headerRow.innerHTML += "<th>Week</th>";
  }

  stageOrder.forEach(s=>headerRow.innerHTML+=`<th>${s}</th>`);
  headerRow.innerHTML += "<th>TOTAL</th>";
}

// FORMAT
function format(sec){
  const h = String(Math.floor(sec/3600)).padStart(2,'0');
  const m = String(Math.floor((sec%3600)/60)).padStart(2,'0');
  const s = String(Math.floor(sec%60)).padStart(2,'0');
  return `${h}:${m}:${s}`;
}

// WORKER RESPONSE
worker.onmessage = function(e) {

  loadingOverlay.classList.add("hidden");

  const {results} = e.data;

  bodyRow.innerHTML = '';
  createHeader();

  let allWeekResults = [];

  results.forEach((res, i)=> {

    let total = 0;
    let row = "<tr>";

    if (!isSingle) {
      row += `<td class="week">${i+1}</td>`;
    }

    let avgObj = {};

    stageOrder.forEach(s=>{
      const avg = res.dur[s] ? res.dur[s]/res.cnt[s] : 0;

      if (avg>0){
        total += avg;
        row += `<td>${format(avg)}</td>`;
      } else {
        row += `<td>N/A</td>`;
      }

      avgObj[s] = avg;
    });

    row += `<td class="total">${format(total)}</td></tr>`;

    bodyRow.innerHTML += row;
    allWeekResults.push(avgObj);
  });

  // multiple only
  if (!isSingle && results.length > 1) {
    addAverageRow(allWeekResults);
  }
};

// ERROR HANDLER ✅ FIX LOOP ISSUE
worker.onerror = function(err){
  console.error(err);
  loadingOverlay.classList.add("hidden");
  alert("Error processing file.");
};

// FINAL ROW
function addAverageRow(allResults) {
  let row = `<tr><td class="week">All Files</td>`;
  let total = 0;

  stageOrder.forEach(stage=>{
    let sum=0, count=0;

    allResults.forEach(w=>{
      if (w[stage]>0){
        sum+=w[stage];
        count++;
      }
    });

    const avg = count? sum/count : 0;

    if (avg>0){
      total+=avg;
      row+=`<td>${format(avg)}</td>`;
    } else {
      row+=`<td>N/A</td>`;
    }
  });

  row+=`<td class="total">${format(total)}</td></tr>`;
  bodyRow.innerHTML += row;
}

// PROCESS
calculateBtn.onclick = async function(){

  if (uploadedFiles.length === 0) return;

  loadingOverlay.classList.remove("hidden");

  let buffers = [];

  for (let file of uploadedFiles) {
    buffers.push(await file.arrayBuffer());
  }

  worker.postMessage({buffers});
};
</script>

</body>
</html>
