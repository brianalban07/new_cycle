<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cycle Time Analyzer</title>

<!-- ✅ CORRECT SCRIPT -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; margin: 20px; background:#f4f6f9; }

.container {
  background:#fff;
  padding:20px;
  border-radius:10px;
  max-width:900px;
  margin:auto;
}

button {
  padding:8px 15px;
  background:#0078d4;
  border:none;
  color:#fff;
  border-radius:5px;
}

.hidden { display:none; }

/* Loading */
#loadingOverlay {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:#fff;
  z-index:9999;
}

.spinner {
  border:5px solid #ccc;
  border-top:5px solid #0078d4;
  border-radius:50%;
  width:50px;
  height:50px;
  animation:spin 1s linear infinite;
}

@keyframes spin {100%{transform:rotate(360deg);}}

/* Table */
table {
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}
th,td {
  border:1px solid #ddd;
  padding:6px;
  text-align:center;
}
th { background:#333; color:#fff; }
.week { background:#ffd966; }
.total { background:#28a745; color:#fff; }
</style>
</head>

<body>

<div class="container">

<h2>Cycle Time Analyzer</h2>

<select id="modeSelect">
  <option value="">Select Mode</option>
  <option value="single">Single</option>
  <option value="multiple">Multiple</option>
</select>

<input type="number" id="weekCount" class="hidden" placeholder="No. of Weeks">

<div id="fileContainer"></div>

<button id="calculateBtn" class="hidden">Calculate</button>

<table>
<thead><tr id="headerRow"></tr></thead>
<tbody id="bodyRow"></tbody>
</table>

</div>

<!-- ✅ LOADING -->
<div id="loadingOverlay" class="hidden">
  <div class="spinner"></div>
  <div>Processing... please wait</div>
</div>

<script>
const stageOrder = ["INIT","AST","FLA","IOT","FCT","FC2","IST","FPF","NVL"];

let uploadedFiles = [];
let isSingle = false;

// ✅ CRITICAL FIX (path)
let worker = new Worker('./fileWorker.js');

// MODE
modeSelect.onchange = function() {
  uploadedFiles = [];
  fileContainer.innerHTML = '';
  bodyRow.innerHTML = '';
  calculateBtn.classList.add("hidden");

  if (this.value === "single") {
    isSingle = true;
    weekCount.classList.add("hidden");
    createInputs(1);
  } else {
    isSingle = false;
    weekCount.classList.remove("hidden");
  }
};

// CREATE INPUTS
weekCount.onchange = function() {
  createInputs(parseInt(this.value));
};

function createInputs(count){
  fileContainer.innerHTML='';
  uploadedFiles = new Array(count).fill(null);

  for (let i=0;i<count;i++){
    let div=document.createElement('div');
    div.innerHTML=`Week ${i+1}: <input type="file">`;

    div.querySelector('input').onchange=e=>{
      uploadedFiles[i]=e.target.files[0];
      if(uploadedFiles.every(f=>f)) calculateBtn.classList.remove("hidden");
    };

    fileContainer.appendChild(div);
  }
}

// HEADER
function createHeader(){
  headerRow.innerHTML='';

  if(!isSingle) headerRow.innerHTML+='<th>Week</th>';

  stageOrder.forEach(s=>{
    headerRow.innerHTML+=`<th>${s}</th>`;
  });

  headerRow.innerHTML+='<th>TOTAL</th>';
}

// FORMAT
function format(sec){
  let h=Math.floor(sec/3600);
  let m=Math.floor((sec%3600)/60);
  let s=Math.floor(sec%60);
  return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
}

// RECEIVE
worker.onmessage=function(e){

  loadingOverlay.classList.add("hidden");

  const {results}=e.data;

  bodyRow.innerHTML='';
  createHeader();

  let all=[];

  results.forEach((r,i)=>{
    let total=0;
    let row="<tr>";

    if(!isSingle) row+=`<td class="week">${i+1}</td>`;

    let avgObj={};

    stageOrder.forEach(s=>{
      let avg=r.dur[s]?r.dur[s]/r.cnt[s]:0;

      if(avg>0){
        total+=avg;
        row+=`<td>${format(avg)}</td>`;
      } else row+="<td>N/A</td>";

      avgObj[s]=avg;
    });

    row+=`<td class="total">${format(total)}</td></tr>`;
    bodyRow.innerHTML+=row;

    all.push(avgObj);
  });

  if(!isSingle && results.length>1) addAverageRow(all);
};

// ERROR FIX ✅
worker.onerror=function(err){
  console.error(err);
  loadingOverlay.classList.add("hidden");
  alert("Worker failed. Check console.");
};

// ADD AVERAGE
function addAverageRow(all){
  let row="<tr><td class='week'>All Files</td>";
  let total=0;

  stageOrder.forEach(stage=>{
    let sum=0,count=0;

    all.forEach(w=>{
      if(w[stage]>0){ sum+=w[stage]; count++; }
    });

    let avg=count?sum/count:0;

    if(avg>0){
      total+=avg;
      row+=`<td>${format(avg)}</td>`;
    } else row+="<td>N/A</td>";
  });

  row+=`<td class="total">${format(total)}</td></tr>`;
  bodyRow.innerHTML+=row;
}

// PROCESS
calculateBtn.onclick=async function(){

  if(uploadedFiles.length===0) return;

  loadingOverlay.classList.remove("hidden");

  let buffers=[];

  for(let f of uploadedFiles){
    buffers.push(await f.arrayBuffer());
  }

  worker.postMessage({buffers});
};
</script>

</body>
</html>
